<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>吃饭邀请函</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: radial-gradient(ellipse at center, #5c2a3a 0%, #3d1522 40%, #1f0810 100%);
    font-family: 'Noto Serif SC', serif;
    overflow-x: hidden;
  }

  /* ── 点击进场 ── */
  .splash {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 200;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 18px;
    cursor: pointer;
    background: radial-gradient(ellipse at center, #5c2a3a 0%, #3d1522 40%, #1f0810 100%);
    transition: opacity 0.5s, visibility 0.5s;
  }
  .splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
  .splash-icon { font-size: 66px; animation: sPulse 1.6s ease-in-out infinite; }
  @keyframes sPulse {
    0%,100% { transform: scale(1); opacity: 0.85; }
    50% { transform: scale(1.12); opacity: 1; }
  }
  .splash-title { font-size: 22px; color: #ffe4ec; letter-spacing: 4px; font-weight: 700; }
  .splash-hint  { font-size: 14px; color: rgba(255,255,255,0.45); letter-spacing: 2px; }

  /* Music button */
  .music-btn {
    position: fixed;
    top: 24px; right: 24px;
    z-index: 10;
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 2px solid #f0c0d0;
    background: rgba(210, 120, 150, 0.8);
    color: #fff;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 16px rgba(255, 180, 200, 0.35);
    transition: all 0.3s ease;
    animation: musicPulse 2s ease-in-out infinite;
  }
  .music-btn:hover {
    background: rgba(230, 130, 160, 0.95);
    box-shadow: 0 0 24px rgba(255, 180, 200, 0.6);
    transform: scale(1.08);
  }
  .music-btn.playing { animation: musicSpin 3s linear infinite; border-color: #fff; }
  .music-btn.paused { animation: musicPulse 2s ease-in-out infinite; opacity: 0.65; }
  @keyframes musicPulse {
    0%, 100% { box-shadow: 0 0 10px rgba(255, 180, 200, 0.25); }
    50% { box-shadow: 0 0 22px rgba(255, 180, 200, 0.5); }
  }
  @keyframes musicSpin {
    0%   { box-shadow: 0 0 16px rgba(255, 200, 220, 0.5); }
    50%  { box-shadow: 0 0 30px rgba(255, 200, 220, 0.85); }
    100% { box-shadow: 0 0 16px rgba(255, 200, 220, 0.5); }
  }

  /* Floating particles */
  .particles {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .particle {
    position: absolute;
    animation: floatUp 9s linear infinite;
    opacity: 0;
    font-size: 20px;
  }

  @keyframes floatUp {
    0%   { transform: translateY(105vh) rotate(0deg) scale(0); opacity: 0; }
    8%   { opacity: 0.9; }
    85%  { opacity: 0.4; }
    100% { transform: translateY(-10vh) rotate(360deg) scale(1.3); opacity: 0; }
  }

  /* Main card */
  .card-wrapper { position: relative; z-index: 1; }

  .card {
    position: relative;
    width: 420px; height: 560px;
    /* Light pink gradient based on #ffc5d5 */
    background: linear-gradient(175deg,
      #e8a8b8 0%,
      #f5bcc8 4%,
      #ffc5d5 10%,
      #fcc2d2 45%,
      #f5bcc8 55%,
      #fcc2d2 90%,
      #f5bcc8 96%,
      #e8a8b8 100%
    );
    border-radius: 16px;
    padding: 32px 34px 28px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    box-shadow:
      0 0 50px rgba(255, 180, 200, 0.35),
      0 0 120px rgba(230, 140, 170, 0.15),
      0 20px 70px rgba(0, 0, 0, 0.5);
    text-align: center;
    animation: cardFloat 3.5s ease-in-out infinite;
  }

  @keyframes cardFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  .card::before {
    content: '';
    position: absolute;
    top: 10px; left: 10px; right: 10px; bottom: 10px;
    border: 1.5px solid rgba(255,255,255,0.5);
    border-radius: 10px;
    pointer-events: none;
  }

  .card::after {
    content: '';
    position: absolute;
    top: 14px; left: 14px; right: 14px; bottom: 14px;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 8px;
    pointer-events: none;
  }

  .corner {
    position: absolute;
    width: 44px; height: 44px;
    border-color: rgba(255,255,255,0.6);
    border-style: solid;
    opacity: 0.9;
  }
  .corner-tl { top: 18px; left: 18px; border-width: 2.5px 0 0 2.5px; border-radius: 6px 0 0 0; }
  .corner-tr { top: 18px; right: 18px; border-width: 2.5px 2.5px 0 0; border-radius: 0 6px 0 0; }
  .corner-bl { bottom: 18px; left: 18px; border-width: 0 0 2.5px 2.5px; border-radius: 0 0 0 6px; }
  .corner-br { bottom: 18px; right: 18px; border-width: 0 2.5px 2.5px 0; border-radius: 0 0 6px 0; }

  .top-lantern {
    font-size: 40px;
    margin-bottom: 0;
    filter: drop-shadow(0 0 12px rgba(255, 200, 220, 0.6));
    animation: lanternGlow 2s ease-in-out infinite alternate;
  }

  @keyframes lanternGlow {
    0%   { filter: drop-shadow(0 0 8px rgba(255, 200, 220, 0.4)); }
    100% { filter: drop-shadow(0 0 22px rgba(255, 200, 220, 0.9)); }
  }

  /* Dark text on light pink bg */
  .title {
    font-size: 26px;
    font-weight: 900;
    color: #6b1a30;
    margin: 6px 0 4px;
    letter-spacing: 3px;
    text-shadow: 0 1px 2px rgba(255,255,255,0.4);
  }

  .divider {
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 8px 0;
    gap: 12px;
  }
  .divider-line {
    flex: 1;
    height: 1.5px;
    background: linear-gradient(90deg, transparent, rgba(140,40,60,0.4), transparent);
  }
  .divider-diamond {
    font-size: 12px;
    color: #8b3a50;
  }

  .greeting {
    font-size: 17px;
    color: #6b1a30;
    margin: 8px 0;
    font-weight: 700;
    letter-spacing: 2px;
  }

  .content {
    font-size: 15.5px;
    color: #7a2a40;
    line-height: 2.1;
    margin: 6px 0;
    letter-spacing: 1.8px;
  }

  .content .highlight {
    color: #8b1a3d;
    font-weight: 700;
    font-size: 16px;
  }

  .shuangxi {
    font-size: 52px;
    color: #8b1a3d;
    margin: 8px 0;
    font-weight: 900;
    text-shadow: 0 0 15px rgba(180,60,100,0.3);
    animation: xiPulse 2s ease-in-out infinite;
  }

  @keyframes xiPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }

  .info-box {
    background: rgba(255,255,255,0.25);
    border: 1.5px solid rgba(180,80,100,0.3);
    border-radius: 10px;
    padding: 10px 18px;
    margin: 8px 0;
  }

  .info-box .icon-label {
    font-size: 14px;
    color: #6b1a30;
    font-weight: 700;
    margin-bottom: 3px;
    letter-spacing: 1px;
  }

  .info-box .info-text {
    font-size: 14.5px;
    color: #5a1a2a;
    line-height: 1.8;
    letter-spacing: 1.2px;
  }

  .info-box .info-text .sub {
    font-size: 12px;
    color: #8b3a50;
  }

  .invite-line {
    font-size: 15.5px;
    font-weight: 700;
    color: #6b1a30;
    letter-spacing: 1.5px;
  }

  .rings {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 3px;
    margin: 2px 0;
  }
  .ring-icon {
    font-size: 24px;
    filter: drop-shadow(0 0 6px rgba(180,80,120,0.4));
    animation: ringGlow 2s ease-in-out infinite alternate;
  }
  .ring-icon:nth-child(2) { animation-delay: 0.4s; }

  @keyframes ringGlow {
    0%   { opacity: 0.5; transform: scale(0.92); }
    100% { opacity: 1;   transform: scale(1.06); }
  }

  .bottom-lantern {
    font-size: 30px;
    margin-top: 4px;
    opacity: 0.7;
    filter: drop-shadow(0 0 8px rgba(255,200,220,0.4));
  }

  .sparkle {
    position: absolute;
    width: 5px; height: 5px;
    background: radial-gradient(circle, #fff, #ffd0e0);
    border-radius: 50%;
    pointer-events: none;
    animation: sparkle 1.8s ease-in-out infinite;
  }

  @keyframes sparkle {
    0%, 100% { opacity: 0; transform: scale(0); }
    50% { opacity: 0.9; transform: scale(1); }
  }

  @media (max-width: 460px) {
    .card {
      width: 94vw;
      height: auto;
      aspect-ratio: 3 / 4;
      padding: 26px 20px 22px;
    }
    .title { font-size: 22px; }
    .content { font-size: 13px; }
    .shuangxi { font-size: 42px; }
    .greeting { font-size: 15px; }
    .invite-line { font-size: 13.5px; }
  }
</style>
</head>
<body>

<!-- 点击进场 -->
<div class="splash" id="splash">
  <div class="splash-icon">💌</div>
  <div class="splash-title">点 击 进 场</div>
  <div class="splash-hint">🎵 音乐即将响起</div>
</div>

<div class="particles" id="particles"></div>

<button class="music-btn paused" id="musicBtn" title="播放/暂停音乐">🎵</button>

<audio id="bgm" loop preload="auto" autoplay>
  <source src="今天你要嫁给我.mp3" type="audio/mpeg">
</audio>

<div class="card-wrapper">
  <div class="card">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="top-lantern">🏮</div>
    <div class="title">💒喜➕喜＝囍❣️</div>
    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-diamond">◆</span>
      <div class="divider-line"></div>
    </div>
    <div class="greeting">✨💌 亲爱的工友：</div>
    <div class="content">
      🌺<span class="highlight">良辰已定</span>，吉日待访💞<br>
      🌹<span class="highlight">吾無星星</span>，遂邀良友💖
    </div>
    <div class="content">
      🥳<span class="highlight">敬备戳戳</span>，随候尊驾💞
    </div>
    <div class="shuangxi">囍</div>
    <div class="invite-line">💌诚挚的邀请您一起共赴晚餐❣️</div>
    <div class="info-box">
      <div class="icon-label">⏰ 时间</div>
      <div class="info-text">
        2026年6月28日<br>
        <span class="sub">（农历五月十四 · 周日）</span>
      </div>
    </div>
    <div class="info-box">
      <div class="icon-label">🏡 地址</div>
      <div class="info-text">
        新盛璟城一区一幢2103💞
      </div>
    </div>
    <div class="rings">
      <span class="ring-icon">💍</span>
      <span class="ring-icon">💍</span>
    </div>
    <div class="bottom-lantern">🏮</div>
  </div>
</div>

<script>
  // ── 点击进场 → 播放 BGM ──
  const splash = document.getElementById('splash');
  const bgm = document.getElementById('bgm');
  const musicBtn = document.getElementById('musicBtn');
  bgm.volume = 0.6;

  function updateBtnPlaying() {
    musicBtn.classList.remove('paused');
    musicBtn.classList.add('playing');
    musicBtn.textContent = '🎶';
    musicBtn.title = '暂停音乐';
  }
  function updateBtnPaused() {
    musicBtn.classList.remove('playing');
    musicBtn.classList.add('paused');
    musicBtn.textContent = '🎵';
    musicBtn.title = '播放音乐';
  }
  function updateBtnError() {
    musicBtn.classList.remove('playing');
    musicBtn.classList.add('paused');
    musicBtn.textContent = '🔇';
    musicBtn.title = '加载失败，点击重试';
  }

  splash.addEventListener('click', () => {
    splash.classList.add('hidden');
    bgm.play().then(updateBtnPlaying).catch(updateBtnError);
  });

  bgm.addEventListener('playing', updateBtnPlaying);
  bgm.addEventListener('pause', updateBtnPaused);
  bgm.addEventListener('error', updateBtnError);

  musicBtn.addEventListener('click', () => {
    if (bgm.paused) {
      bgm.play().then(updateBtnPlaying).catch(updateBtnError);
    } else {
      bgm.pause();
      updateBtnPaused();
    }
  });

  // ── 粒子 & 闪光 ──
  const pc = document.getElementById('particles');
  ['🌸','🩷','💗','💖','🎀','🌷','💐','🪷','✨','💫','💕'].forEach((e,i) => {
    const p = document.createElement('span');
    p.className = 'particle';
    p.textContent = e;
    p.style.left = Math.random()*100+'%';
    p.style.animationDuration = (7+Math.random()*12)+'s';
    p.style.animationDelay = Math.random()*9+'s';
    p.style.fontSize = (14+Math.random()*24)+'px';
    pc.appendChild(p);
  });

  const card = document.querySelector('.card');
  [[8,8],[92,6],[6,94],[94,92],[10,50],[90,48],[50,8],[50,94],[25,15],[75,14],[28,88],[76,86]].forEach(([x,y],i) => {
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.style.left = x+'%'; s.style.top = y+'%';
    s.style.animationDelay = (i*0.18)+'s';
    card.appendChild(s);
  });
</script>

</body>
</html>
