<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>婚礼邀请函</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; font-family: 'Noto Serif SC', serif;
    background: radial-gradient(ellipse at center, #2d0808 0%, #0d0000 100%);
    gap: 40px; flex-wrap: wrap; padding: 20px;
  }
  .card-link {
    display: flex; flex-direction: column; align-items: center; gap: 16px;
    text-decoration: none; transition: transform 0.3s;
  }
  .card-link:hover { transform: translateY(-8px) scale(1.03); }
  .preview {
    width: 180px; height: 240px; border-radius: 12px; overflow: hidden;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
  }
  .preview.red  { background: linear-gradient(175deg, #9b1b1b, #cc1f1f, #a31919, #b81c1c); }
  .preview.pink { background: linear-gradient(175deg, #8b1a3d, #c2285a, #9e1842, #b81e50); }
  .label {
    font-size: 18px; font-weight: 700; letter-spacing: 2px;
    padding: 8px 24px; border-radius: 20px;
  }
  .label.red  { color: #ffd54f; background: rgba(180,40,40,0.4); border: 1px solid #e2c066; }
  .label.pink { color: #ffe4ec; background: rgba(180,40,90,0.4); border: 1px solid #f0b8c8; }
</style>
</head>
<body>
<a class="card-link" href="./red/">
  <div class="preview red"></div>
  <span class="label red">🧧 经典中国红</span>
</a>
<a class="card-link" href="./pink/">
  <div class="preview pink"></div>
  <span class="label pink">🌸 粉色浪漫</span>
</a>
</body>
</html>
